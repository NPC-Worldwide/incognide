<div id="download-section">
  <h3>Download Incognide</h3>
  <div id="version-info">Loading version...</div>
  <div id="download-buttons"></div>
  <div id="version-selector" style="display:none; margin-top:15px;">
    <label for="version-dropdown" style="font-weight:bold; display:block; margin-bottom:5px;">Other versions:</label>
    <select id="version-dropdown" style="padding:8px 12px; font-size:14px; border:1px solid #ccc; border-radius:4px; min-width:280px;"></select>
    <div id="alt-download-buttons" style="margin-top:10px;"></div>
    <div id="alt-version-info" style="font-size:12px; color:#666; margin-top:6px;"></div>
  </div>
</div>
<style>
#download-section {
  max-width: 600px;
  margin: 20px auto;
  padding: 20px;
  border: 1px solid #ddd;
  border-radius: 8px;
}
.download-btn {
  display: inline-block;
  margin: 5px;
  padding: 10px 15px;
  color: white;
  text-decoration: none;
  border-radius: 4px;
  font-weight: bold;
}
.download-btn:hover { filter: brightness(0.85); }
.download-btn.latest { background: #007cba; }
.download-btn.stable { background: #28a745; }
.download-btn.rapid { background: #fd7e14; }
.download-btn.appstore { background: #000000; }
#version-info {
  margin-bottom: 15px;
  font-weight: bold;
}
</style>
<script>
(function() {
  var BUCKET = 'https://storage.googleapis.com/incognide-executables';
  var RELEASES_API = 'https://api.github.com/repos/NPC-Worldwide/incognide/releases?per_page=30';
  var GITHUB_RAW = 'https://raw.githubusercontent.com/NPC-Worldwide/incognide';
  var MAC_APP_STORE = 'https://apps.apple.com/my/app/incognide/id6758482523?mt=12';
  var THREE_DAYS = 3 * 24 * 60 * 60 * 1000;
  var ONE_MONTH = 30 * 24 * 60 * 60 * 1000;

  function dlUrl(ver, platform, ext) {
    var arch = platform === 'macos-arm64' ? 'arm64' : 'x64';
    return BUCKET + '/' + platform + '/incognide_' + ver + '_' + arch + '.' + ext;
  }

  function makeButtons(ver, cls) {
    return '<a href="' + dlUrl(ver, 'linux-x64', 'deb') + '" class="download-btn ' + cls + '" download>Linux x64 (.deb)</a>' +
      '<a href="' + dlUrl(ver, 'windows-x64', 'exe') + '" class="download-btn ' + cls + '" download>Windows x64</a>' +
      '<a href="' + dlUrl(ver, 'macos-arm64', 'dmg') + '" class="download-btn ' + cls + '" download>macOS (Apple Silicon)</a>' +
      '<a href="' + MAC_APP_STORE + '" class="download-btn appstore" target="_blank">Mac App Store</a>';
  }

  function init() {
    var versionInfo = document.getElementById('version-info');
    var downloadButtons = document.getElementById('download-buttons');
    var versionSelector = document.getElementById('version-selector');
    var dropdown = document.getElementById('version-dropdown');
    var altButtons = document.getElementById('alt-download-buttons');
    var altInfo = document.getElementById('alt-version-info');

    fetch(BUCKET + '/manifest.json?t=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(manifest) {
        versionInfo.textContent = 'Latest version: v' + manifest.version;
        downloadButtons.innerHTML = makeButtons(manifest.version, 'latest');

        fetch(RELEASES_API)
          .then(function(r) { return r.json(); })
          .then(function(releases) {
            var now = Date.now();
            var versions = [];
            var i, gap;
            for (i = 0; i < releases.length; i++) {
              var r = releases[i];
              var ver = r.tag_name.replace(/^v/, '');
              var date = new Date(r.published_at);
              if (now - date.getTime() > ONE_MONTH) continue;
              if (ver === manifest.version) continue;
              versions.push({ ver: ver, tag: r.tag_name, date: date, stability: null, npcpy: null });
            }
            if (versions.length === 0) return;

            for (i = 0; i < versions.length; i++) {
              if (i === 0) {
                gap = now - versions[0].date.getTime();
              } else {
                gap = versions[i - 1].date.getTime() - versions[i].date.getTime();
              }
              versions[i].stability = gap >= THREE_DAYS ? 'stable' : 'rapid';
            }

            versionSelector.style.display = 'block';
            var byVer = {};

            for (i = 0; i < versions.length; i++) {
              var v = versions[i];
              byVer[v.ver] = v;
              var opt = document.createElement('option');
              opt.value = v.ver;
              opt.textContent = 'v' + v.ver + (v.stability === 'stable' ? ' (stable)' : ' (rapid)');
              dropdown.appendChild(opt);
            }

            function showAlt(v) {
              altButtons.innerHTML = makeButtons(v.ver, v.stability);
              var info = 'Released ' + v.date.toLocaleDateString();
              if (v.stability === 'stable') info += ' - stable release';
              else info += ' - rapid release';
              if (v.npcpy) info += ' - requires ' + v.npcpy;
              altInfo.textContent = info;
            }

            showAlt(versions[0]);
            dropdown.addEventListener('change', function() {
              if (byVer[dropdown.value]) showAlt(byVer[dropdown.value]);
            });

            for (i = 0; i < versions.length; i++) {
              (function(v) {
                fetch(GITHUB_RAW + '/' + v.tag + '/requirements.txt')
                  .then(function(r) { return r.ok ? r.text() : ''; })
                  .then(function(t) {
                    var m = t.match(/npcpy==([^\s]+)/);
                    if (m) {
                      v.npcpy = 'npcpy>=' + m[1];
                      var opts = dropdown.options;
                      for (var j = 0; j < opts.length; j++) {
                        if (opts[j].value === v.ver) {
                          opts[j].textContent = 'v' + v.ver + (v.stability === 'stable' ? ' (stable)' : ' (rapid)') + ' - ' + v.npcpy;
                        }
                      }
                      if (dropdown.value === v.ver) showAlt(v);
                    }
                  })
                  .catch(function() {});
              })(versions[i]);
            }
          })
          .catch(function() {});
      })
      .catch(function(error) {
        console.log('Fetch error:', error);
        versionInfo.textContent = 'Error loading downloads';
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
