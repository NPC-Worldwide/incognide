name: CI Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # =============================================================================
  # Frontend build + type check
  # =============================================================================
  frontend:
    name: Frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          npm install
          npm install @rollup/rollup-linux-x64-gnu --save-optional
        env:
          npm_config_optional: true

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          npm install
          npm install @rollup/rollup-win32-x64-msvc --save-optional
        env:
          npm_config_optional: true

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          npm install
          npm install @rollup/rollup-darwin-arm64 --save-optional
        env:
          npm_config_optional: true

      - name: Vite build
        run: npm run build:vite
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder

      - name: Check for import errors (no dead imports)
        shell: bash
        run: |
          # Verify the build didn't silently drop exports
          if grep -r "is not exported by" dist/ 2>/dev/null; then
            echo "Found unresolved exports in build output"
            exit 1
          fi
          echo "No import errors in build"

      - name: Run unit tests
        run: npm test

  # =============================================================================
  # Backend serve.py tests (cross-platform)
  # =============================================================================
  backend:
    name: Backend (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: '3.11'
          - os: windows-latest
            python: '3.11'
          - os: windows-latest
            python: '3.12'
          - os: macos-latest
            python: '3.11'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Test npcpy.serve imports
        run: |
          python -c "from npcpy.serve import app; print(f'OK: {len(app.url_map._rules)} routes')"

      - name: Test critical endpoints registered
        run: |
          python -c "
          from npcpy.serve import app
          rules = [r.rule for r in app.url_map.iter_rules()]
          for endpoint in ['/api/models', '/api/health']:
              assert endpoint in rules, f'Missing {endpoint}'
              print(f'OK: {endpoint}')
          print('All critical endpoints registered')
          "

      - name: Test directory creation
        run: |
          python -c "
          import os, tempfile
          home = os.path.expanduser('~')
          npcsh_base = os.path.join(home, '.npcsh')
          dirs = [
              npcsh_base,
              os.path.join(npcsh_base, 'npc_team'),
              os.path.join(npcsh_base, 'npc_team', 'jinxes'),
              os.path.join(npcsh_base, 'incognide', 'data'),
          ]
          for d in dirs:
              os.makedirs(d, exist_ok=True)
              assert os.path.isdir(d), f'Failed: {d}'
              print(f'OK: {d}')
          "

      - name: Test settings file read/write (npcshrc)
        run: |
          python -c "
          import os, tempfile
          # Simulate settings write like serve.py does
          rc_path = os.path.join(tempfile.gettempdir(), '.npcshrc_test')
          settings = {'NPCSH_CHAT_MODEL': 'test-model', 'NPCSH_CHAT_PROVIDER': 'ollama'}
          with open(rc_path, 'w') as f:
              for k, v in settings.items():
                  f.write(f'export {k}={v}\n')
          # Read them back
          loaded = {}
          with open(rc_path) as f:
              for line in f:
                  line = line.strip()
                  if line.startswith('export ') and '=' in line:
                      k, v = line[7:].split('=', 1)
                      loaded[k.strip()] = v.strip()
          assert loaded['NPCSH_CHAT_MODEL'] == 'test-model', f'Got: {loaded}'
          assert loaded['NPCSH_CHAT_PROVIDER'] == 'ollama', f'Got: {loaded}'
          os.unlink(rc_path)
          print('Settings round-trip OK')
          "

      - name: Test server startup (start, health check, stop)
        shell: bash
        run: |
          # Start server in background
          python -m npcpy.serve &
          SERVER_PID=$!
          sleep 8

          # Health check
          HEALTH=$(python -c "
          import urllib.request, json, sys
          try:
              r = urllib.request.urlopen('http://127.0.0.1:5337/api/health', timeout=5)
              print(r.read().decode())
          except Exception as e:
              print(f'FAIL: {e}', file=sys.stderr)
              sys.exit(1)
          " 2>&1) || true
          echo "Health: $HEALTH"

          # Models endpoint
          python -c "
          import urllib.request, json, sys
          try:
              resp = urllib.request.urlopen('http://127.0.0.1:5337/api/models', timeout=10)
              data = json.loads(resp.read())
              print(f'Models endpoint OK, returned {type(data).__name__}')
          except Exception as e:
              print(f'Models: {e}', file=sys.stderr)
          " || true

          # Stop
          kill $SERVER_PID 2>/dev/null || true
          echo "Server test complete"
        timeout-minutes: 3

  # =============================================================================
  # Electron main process tests
  # =============================================================================
  electron:
    name: Electron main process
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        env:
          npm_config_optional: true

      - name: Verify preload.js syntax
        run: node --check src/preload.js

      - name: Verify all IPC modules syntax
        shell: bash
        run: |
          for f in src/ipc/*.js; do
            node --check "$f"
          done

      - name: Smoke-test registerAll (catches duplicate ipcMain.handle channels)
        shell: bash
        run: |
          node -e "
            const registered = new Set();
            const stub = () => {};
            const ipcMain = {
              handle: (channel) => {
                if (registered.has(channel)) {
                  throw new Error('Duplicate ipcMain.handle for channel: ' + channel);
                }
                registered.add(channel);
              },
              on: stub,
              removeHandler: stub,
              removeAllListeners: stub,
            };
            const { registerAll } = require('./src/ipc');
            registerAll({
              ipcMain,
              getMainWindow: () => null,
              dbQuery: async () => [],
              callBackendApi: async () => ({}),
              BACKEND_URL: 'http://127.0.0.1:5337',
              BACKEND_PORT: 5337,
              log: () => {},
              logBackend: () => {},
              generateId: () => 'id',
              activeStreams: new Map(),
              DEFAULT_CONFIG: {},
              app: { getAppPath: () => process.cwd(), getPath: () => process.cwd() },
              IS_DEV_MODE: true,
              cronJobs: new Map(),
              daemons: new Map(),
              scheduleCronJob: () => {},
              deviceConfig: {},
              updateDeviceConfig: () => {},
              getOrCreateDeviceId: () => 'dev',
              needsFirstRunSetup: () => false,
              saveBackendPythonPath: () => {},
              markSetupComplete: () => {},
              getBackendPythonPath: () => null,
              getUserProfile: () => ({}),
              saveUserProfile: () => {},
              registerGlobalShortcut: () => {},
              backendProcess: null,
              killBackendProcess: () => {},
              ensureUserDataDirectory: () => {},
              waitForServer: async () => {},
              logsDir: '/tmp',
              electronLogPath: '/tmp/electron.log',
              backendLogPath: '/tmp/backend.log',
              ensureTablesExist: async () => {},
              appDir: process.cwd() + '/src',
              NPCSH_BASE: '/tmp/.npcsh',
            });
            console.log('OK: registered ' + registered.size + ' unique channels');
          "

      - name: Test GGUF path detection includes Windows paths
        if: runner.os == 'Windows'
        run: |
          node -e "
          const path = require('path');
          const os = require('os');
          const home = os.homedir();
          const appData = process.env.APPDATA || path.join(home, 'AppData', 'Roaming');
          const localAppData = process.env.LOCALAPPDATA || path.join(home, 'AppData', 'Local');
          const lmStudioPath = path.join(appData, 'LM Studio', 'models');
          console.log('APPDATA LM Studio path:', lmStudioPath);
          console.log('LOCALAPPDATA:', localAppData);
          console.log('Home:', home);
          // These paths should be constructable on Windows
          console.log('Path construction OK');
          "

  # =============================================================================
  # Summary
  # =============================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [frontend, backend, electron]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.frontend.result }}" = "failure" ]; then
            echo "Frontend tests failed"
            exit 1
          fi
          if [ "${{ needs.backend.result }}" = "failure" ]; then
            echo "Backend tests failed"
            exit 1
          fi
          if [ "${{ needs.electron.result }}" = "failure" ]; then
            echo "Electron tests failed"
            exit 1
          fi
          echo "All CI checks passed"
