name: Install and Verify Autolinters

on:
  workflow_run:
    workflows: ["Build and Release"]  # matches the build file's name exactly
    types: [completed]
    branches-ignore: [main]

  workflow_dispatch:

jobs:
  # -------------------------------------------
  # Only proceed if the Build and Release passed
  # -------------------------------------------
  check-build-status:
    name: Check build passed
    runs-on: ubuntu-latest
    outputs:
      build_passed: ${{ steps.check.outputs.build_passed }}
    steps:
      - name: Check build workflow conclusion
        id: check
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" == "success" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "build_passed=true" >> $GITHUB_OUTPUT
          else
            echo "build_passed=false" >> $GITHUB_OUTPUT
            echo "Build workflow did not pass, skipping linter install"
          fi

  # -------------------------------------------
  # Install and verify linters per platform
  # -------------------------------------------
  install-linters:
    name: Install linters on ${{ matrix.os }}
    needs: check-build-status
    if: needs.check-build-status.outputs.build_passed == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:

          # ----------------------------------------
          # macOS ARM (Apple Silicon)
          # ----------------------------------------
          - os: macos-latest
            platform: macos
            arch: arm64
            ruff_url: https://github.com/astral-sh/ruff/releases/latest/download/ruff-aarch64-apple-darwin.tar.gz
            ruff_binary: ruff
            biome_url: https://github.com/biomejs/biome/releases/latest/download/biome-darwin-arm64
            biome_binary: biome
            chktex_install: brew install chktex
            python_cmd: python3

          # ----------------------------------------
          # Windows x64
          # ----------------------------------------
          - os: windows-latest
            platform: windows
            arch: x64
            ruff_url: https://github.com/astral-sh/ruff/releases/latest/download/ruff-x86_64-pc-windows-msvc.zip
            ruff_binary: ruff.exe
            biome_url: https://github.com/biomejs/biome/releases/latest/download/biome-win32-x64.exe
            biome_binary: biome.exe
            chktex_install: choco install chktex --yes
            python_cmd: python

          # ----------------------------------------
          # Ubuntu (Linux x64)
          # ----------------------------------------
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            ruff_url: https://github.com/astral-sh/ruff/releases/latest/download/ruff-x86_64-unknown-linux-gnu.tar.gz
            ruff_binary: ruff
            biome_url: https://github.com/biomejs/biome/releases/latest/download/biome-linux-x64
            biome_binary: biome
            chktex_install: sudo apt-get install -y chktex
            python_cmd: python3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ----------------------------------------
      # Download the build artifact from the
      # "Build and Release" workflow so we can
      # bundle linters into the same installer
      # ----------------------------------------
      - name: Download build artifact for this platform
        uses: actions/download-artifact@v4
        with:
          name: incognide-${{ matrix.platform }}-${{ matrix.arch }}
          path: upload/
        continue-on-error: true  # non-fatal if artifact not yet available

      # ----------------------------------------
      # Create linter output directory
      # ----------------------------------------
      - name: Create linters directory
        run: mkdir -p linters/bin

      # ==========================================
      # RUFF (Python linter)
      # Single binary, works on all 3 platforms
      # ==========================================

      - name: Download Ruff (macOS / Linux)
        if: matrix.platform != 'windows'
        run: |
          curl -L ${{ matrix.ruff_url }} -o ruff.tar.gz
          tar -xzf ruff.tar.gz
          mv ruff linters/bin/${{ matrix.ruff_binary }}
          chmod +x linters/bin/${{ matrix.ruff_binary }}

      - name: Download Ruff (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ matrix.ruff_url }}" -OutFile "ruff.zip"
          Expand-Archive -Path "ruff.zip" -DestinationPath "ruff_extracted"
          Move-Item "ruff_extracted\ruff.exe" "linters\bin\${{ matrix.ruff_binary }}"

      - name: Verify Ruff installation
        run: linters/bin/${{ matrix.ruff_binary }} --version

      # ==========================================
      # BIOME (JS/TS linter)
      # Single binary, works on all 3 platforms
      # ==========================================

      - name: Download Biome (macOS / Linux)
        if: matrix.platform != 'windows'
        run: |
          curl -L ${{ matrix.biome_url }} -o linters/bin/${{ matrix.biome_binary }}
          chmod +x linters/bin/${{ matrix.biome_binary }}

      - name: Download Biome (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ matrix.biome_url }}" -OutFile "linters\bin\${{ matrix.biome_binary }}"

      - name: Verify Biome installation
        run: linters/bin/${{ matrix.biome_binary }} --version

      # ==========================================
      # CHKTEX (LaTeX linter)
      # Installed via package manager per platform
      # ==========================================

      - name: Install ChkTeX
        run: ${{ matrix.chktex_install }}

      - name: Verify ChkTeX installation
        run: chktex --version

      # ==========================================
      # ESLINT (JS/TS - fallback/project-level)
      # Installed via npm, works on all platforms
      # ==========================================

      - name: Install ESLint
        run: npm install --save-dev eslint@latest

      - name: Verify ESLint installation
        run: npx eslint --version

      # ==========================================
      # Verify linter binaries are all present
      # ==========================================

      - name: Check linter configs exist
        shell: bash
        run: |
          echo "Checking for linter binaries..."
          ls -la linters/bin/

      # ==========================================
      # Upload verified linter binaries as artifact
      # Named to match what electron-builder expects
      # via extraResources in package.json
      # ==========================================

      - name: Upload linter binaries
        uses: actions/upload-artifact@v4
        with:
          name: linters-${{ matrix.platform }}-${{ matrix.arch }}
          path: linters/bin/
          retention-days: 7

  # -------------------------------------------
  # Bundle linters into the build artifacts
  # Downloads both the installer and linter
  # artifacts, injects linters, re-uploads
  # -------------------------------------------
  bundle-linters-into-build:
    name: Bundle linters into ${{ matrix.platform }} installer
    needs: install-linters
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: x64
          - os: ubuntu-22.04
            platform: linux
            arch: x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download the installer produced by Build and Release
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: incognide-${{ matrix.platform }}-${{ matrix.arch }}
          path: upload/

      # Download the verified linter binaries
      - name: Download linter binaries
        uses: actions/download-artifact@v4
        with:
          name: linters-${{ matrix.platform }}-${{ matrix.arch }}
          path: linters/bin/

      # Copy linter binaries into resources so electron-builder
      # extraResources config picks them up on next build
      - name: Inject linters into resources folder
        shell: bash
        run: |
          mkdir -p resources/linters
          cp -r linters/bin/. resources/linters/
          echo "Linters staged for bundling:"
          ls -la resources/linters/

      # Re-upload the combined artifact (installer + linters staged)
      # This artifact is what gets picked up for GCS upload or release
      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: incognide-with-linters-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            upload/
            resources/linters/
          retention-days: 7

  # -------------------------------------------
  # Summary job - reports linter install status
  # -------------------------------------------
  linter-summary:
    name: Linter Install Summary
    needs: bundle-linters-into-build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report results
        run: |
          echo "============================================"
          echo "Linter Installation Summary"
          echo "============================================"
          echo "macOS ARM64: ${{ needs.bundle-linters-into-build.result }}"
          echo "Windows x64: ${{ needs.bundle-linters-into-build.result }}"
          echo "Linux x64:   ${{ needs.bundle-linters-into-build.result }}"
          echo ""
          echo "Linters bundled: Ruff, Biome, ChkTeX, ESLint"
          echo "Combined artifacts ready: incognide-with-linters-{platform}-{arch}"
          echo "============================================"
